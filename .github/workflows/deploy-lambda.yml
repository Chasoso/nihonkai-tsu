name: Deploy Lambda

on:
  push:
    branches: [main]
    paths:
      - "backend/lambda/**"
      - "infra/dynamodb/**"
      - ".github/workflows/deploy-lambda.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: lambda-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      LAMBDA_FUNCTION_NAME: ${{ vars.LAMBDA_FUNCTION_NAME }}
      LAMBDA_EXECUTION_ROLE_ARN: ${{ secrets.LAMBDA_EXECUTION_ROLE_ARN }}
      API_NAME: ${{ vars.API_NAME }}
      API_ROUTE_PATH: ${{ vars.API_ROUTE_PATH }}
      API_STAGE_NAME: ${{ vars.API_STAGE_NAME }}
      DAILY_LIMIT_TABLE_NAME: ${{ vars.DAILY_LIMIT_TABLE_NAME }}
      DAILY_LIMIT_MAX_PER_DAY: ${{ vars.DAILY_LIMIT_MAX_PER_DAY }}
      LAMBDA_ARCHITECTURE: ${{ vars.LAMBDA_ARCHITECTURE }}
      LAMBDA_RUNTIME: ${{ vars.LAMBDA_RUNTIME }}
      LAMBDA_TIMEOUT: ${{ vars.LAMBDA_TIMEOUT }}
      LAMBDA_MEMORY_SIZE: ${{ vars.LAMBDA_MEMORY_SIZE }}
      ALLOW_ORIGIN: ${{ vars.ALLOW_ORIGIN }}
      AI_PROVIDER: ${{ vars.AI_PROVIDER }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      OPENAI_MAX_OUTPUT_TOKENS: ${{ vars.OPENAI_MAX_OUTPUT_TOKENS }}
      BEDROCK_REGION: ${{ vars.BEDROCK_REGION }}
      BEDROCK_MODEL_ID: ${{ vars.BEDROCK_MODEL_ID }}
      BEDROCK_MAX_OUTPUT_TOKENS: ${{ vars.BEDROCK_MAX_OUTPUT_TOKENS }}
      RATE_LIMIT_WINDOW_MS: ${{ vars.RATE_LIMIT_WINDOW_MS }}
      RATE_LIMIT_MAX_REQUESTS: ${{ vars.RATE_LIMIT_MAX_REQUESTS }}
      LAMBDA_POST_TEXT_MODE: ${{ vars.LAMBDA_POST_TEXT_MODE }}
      TEST_MODE_FIXED_TEXT: ${{ vars.TEST_MODE_FIXED_TEXT }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LAMBDA_HANDLER_FILE: generate-post-text.mjs
      LAMBDA_ZIP: lambda.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate required settings
        run: |
          test -n "${AWS_REGION}" || (echo "AWS_REGION is not set (Repository Variable)." && exit 1)
          test -n "${LAMBDA_FUNCTION_NAME}" || (echo "LAMBDA_FUNCTION_NAME is not set (Repository Variable)." && exit 1)
          test -n "${LAMBDA_EXECUTION_ROLE_ARN}" || (echo "LAMBDA_EXECUTION_ROLE_ARN is not set (Repository Secret)." && exit 1)

      - name: Ensure DynamoDB table exists (create if missing)
        run: |
          set -euo pipefail
          EFFECTIVE_TABLE_NAME="${DAILY_LIMIT_TABLE_NAME:-nihonkai-post-text-daily-limit}"

          if aws dynamodb describe-table --table-name "${EFFECTIVE_TABLE_NAME}" >/dev/null 2>&1; then
            echo "DynamoDB table already exists: ${EFFECTIVE_TABLE_NAME}"
          else
            jq --arg tableName "${EFFECTIVE_TABLE_NAME}" '. + {TableName:$tableName}' infra/dynamodb/daily-limit-table.json > ddb-create.json
            aws dynamodb create-table --cli-input-json file://ddb-create.json >/dev/null
            aws dynamodb wait table-exists --table-name "${EFFECTIVE_TABLE_NAME}"
            echo "Created DynamoDB table: ${EFFECTIVE_TABLE_NAME}"
          fi

          set +e
          TTL_OUTPUT=$(aws dynamodb update-time-to-live \
            --table-name "${EFFECTIVE_TABLE_NAME}" \
            --time-to-live-specification "Enabled=true,AttributeName=expiresAt" 2>&1)
          TTL_STATUS=$?
          set -e
          if [ "${TTL_STATUS}" -ne 0 ]; then
            if echo "${TTL_OUTPUT}" | grep -qi "TimeToLive is already enabled"; then
              echo "TTL already enabled."
            else
              echo "${TTL_OUTPUT}"
              exit 1
            fi
          fi

      - name: Package Lambda artifact
        working-directory: backend/lambda
        run: |
          cp "${LAMBDA_HANDLER_FILE}" index.mjs
          zip -r "../../${LAMBDA_ZIP}" index.mjs

      - name: Ensure Lambda exists (create if missing)
        run: |
          set -euo pipefail
          if aws lambda get-function --function-name "${LAMBDA_FUNCTION_NAME}" >/dev/null 2>&1; then
            echo "Lambda function already exists: ${LAMBDA_FUNCTION_NAME}"
          else
            ARCH="${LAMBDA_ARCHITECTURE:-x86_64}"
            RUNTIME="${LAMBDA_RUNTIME:-nodejs24.x}"
            TIMEOUT="${LAMBDA_TIMEOUT:-10}"
            MEMORY="${LAMBDA_MEMORY_SIZE:-256}"
            aws lambda create-function \
              --function-name "${LAMBDA_FUNCTION_NAME}" \
              --runtime "${RUNTIME}" \
              --handler index.handler \
              --architectures "${ARCH}" \
              --timeout "${TIMEOUT}" \
              --memory-size "${MEMORY}" \
              --role "${LAMBDA_EXECUTION_ROLE_ARN}" \
              --zip-file "fileb://${LAMBDA_ZIP}"
            aws lambda wait function-active --function-name "${LAMBDA_FUNCTION_NAME}"
          fi

      - name: Deploy function code
        run: |
          aws lambda update-function-code \
            --function-name "${LAMBDA_FUNCTION_NAME}" \
            --zip-file "fileb://${LAMBDA_ZIP}"

      - name: Wait until function update completes
        run: |
          aws lambda wait function-updated \
            --function-name "${LAMBDA_FUNCTION_NAME}"

      - name: "Apply Lambda environment variables (default: test mode)"
        run: |
          set -euo pipefail
          POST_TEXT_MODE="${LAMBDA_POST_TEXT_MODE:-test}"
          EFFECTIVE_AI_PROVIDER="${AI_PROVIDER:-bedrock}"
          EFFECTIVE_OPENAI_MODEL="${OPENAI_MODEL:-gpt-4o-mini}"
          EFFECTIVE_MAX_OUTPUT="${OPENAI_MAX_OUTPUT_TOKENS:-120}"
          EFFECTIVE_BEDROCK_REGION="${BEDROCK_REGION:-us-east-1}"
          EFFECTIVE_BEDROCK_MODEL_ID="${BEDROCK_MODEL_ID:-amazon.nova-lite-v1:0}"
          EFFECTIVE_BEDROCK_MAX_OUTPUT="${BEDROCK_MAX_OUTPUT_TOKENS:-120}"
          EFFECTIVE_RATE_WINDOW="${RATE_LIMIT_WINDOW_MS:-60000}"
          EFFECTIVE_RATE_MAX="${RATE_LIMIT_MAX_REQUESTS:-8}"
          EFFECTIVE_ALLOW_ORIGIN="${ALLOW_ORIGIN:-*}"
          EFFECTIVE_TEST_TEXT="${TEST_MODE_FIXED_TEXT:-テストモード: 今日は魚料理を楽しみました。#変わる海を味わう}"

          jq -n \
            --arg openaiApiKey "${OPENAI_API_KEY}" \
            --arg aiProvider "${EFFECTIVE_AI_PROVIDER}" \
            --arg openaiModel "${EFFECTIVE_OPENAI_MODEL}" \
            --arg openaiMaxOutputTokens "${EFFECTIVE_MAX_OUTPUT}" \
            --arg bedrockRegion "${EFFECTIVE_BEDROCK_REGION}" \
            --arg bedrockModelId "${EFFECTIVE_BEDROCK_MODEL_ID}" \
            --arg bedrockMaxOutputTokens "${EFFECTIVE_BEDROCK_MAX_OUTPUT}" \
            --arg rateLimitWindowMs "${EFFECTIVE_RATE_WINDOW}" \
            --arg rateLimitMaxRequests "${EFFECTIVE_RATE_MAX}" \
            --arg allowOrigin "${EFFECTIVE_ALLOW_ORIGIN}" \
            --arg postTextMode "${POST_TEXT_MODE}" \
            --arg testModeFixedText "${EFFECTIVE_TEST_TEXT}" \
            --arg dailyLimitTableName "${DAILY_LIMIT_TABLE_NAME:-nihonkai-post-text-daily-limit}" \
            --arg dailyLimitMaxPerDay "${DAILY_LIMIT_MAX_PER_DAY:-2000}" \
            '{Variables:{
              OPENAI_API_KEY:$openaiApiKey,
              AI_PROVIDER:$aiProvider,
              OPENAI_MODEL:$openaiModel,
              OPENAI_MAX_OUTPUT_TOKENS:$openaiMaxOutputTokens,
              BEDROCK_REGION:$bedrockRegion,
              BEDROCK_MODEL_ID:$bedrockModelId,
              BEDROCK_MAX_OUTPUT_TOKENS:$bedrockMaxOutputTokens,
              RATE_LIMIT_WINDOW_MS:$rateLimitWindowMs,
              RATE_LIMIT_MAX_REQUESTS:$rateLimitMaxRequests,
              ALLOW_ORIGIN:$allowOrigin,
              POST_TEXT_MODE:$postTextMode,
              TEST_MODE_FIXED_TEXT:$testModeFixedText,
              DAILY_LIMIT_TABLE_NAME:$dailyLimitTableName,
              DAILY_LIMIT_MAX_PER_DAY:$dailyLimitMaxPerDay
            }}' > lambda-env.json

          EFFECTIVE_RUNTIME="${LAMBDA_RUNTIME:-nodejs24.x}"
          EFFECTIVE_TIMEOUT="${LAMBDA_TIMEOUT:-10}"
          EFFECTIVE_MEMORY="${LAMBDA_MEMORY_SIZE:-256}"

          aws lambda update-function-configuration \
            --function-name "${LAMBDA_FUNCTION_NAME}" \
            --runtime "${EFFECTIVE_RUNTIME}" \
            --timeout "${EFFECTIVE_TIMEOUT}" \
            --memory-size "${EFFECTIVE_MEMORY}" \
            --environment file://lambda-env.json

      - name: Wait until configuration update completes
        run: |
          aws lambda wait function-updated \
            --function-name "${LAMBDA_FUNCTION_NAME}"

      - name: Ensure API Gateway HTTP API exists and is configured
        id: apigw
        run: |
          set -euo pipefail

          EFFECTIVE_API_NAME="${API_NAME:-${LAMBDA_FUNCTION_NAME}-http-api}"
          EFFECTIVE_ROUTE_PATH="${API_ROUTE_PATH:-/api/generate-post-text}"
          EFFECTIVE_STAGE_NAME="${API_STAGE_NAME:-\$default}"
          EFFECTIVE_ALLOW_ORIGIN="${ALLOW_ORIGIN:-*}"
          ROUTE_KEY="POST ${EFFECTIVE_ROUTE_PATH}"
          CLEAN_PATH="${EFFECTIVE_ROUTE_PATH#/}"

          API_ID=$(aws apigatewayv2 get-apis --query "Items[?Name=='${EFFECTIVE_API_NAME}'].ApiId | [0]" --output text)
          if [ -z "${API_ID}" ] || [ "${API_ID}" = "None" ]; then
            API_ID=$(aws apigatewayv2 create-api \
              --name "${EFFECTIVE_API_NAME}" \
              --protocol-type HTTP \
              --cors-configuration "AllowOrigins=${EFFECTIVE_ALLOW_ORIGIN},AllowMethods=POST,OPTIONS,AllowHeaders=content-type,MaxAge=600" \
              --query "ApiId" \
              --output text)
            echo "Created API Gateway HTTP API: ${EFFECTIVE_API_NAME} (${API_ID})"
          else
            aws apigatewayv2 update-api \
              --api-id "${API_ID}" \
              --cors-configuration "AllowOrigins=${EFFECTIVE_ALLOW_ORIGIN},AllowMethods=POST,OPTIONS,AllowHeaders=content-type,MaxAge=600" >/dev/null
            echo "Using existing API Gateway HTTP API: ${EFFECTIVE_API_NAME} (${API_ID})"
          fi

          LAMBDA_ARN=$(aws lambda get-function --function-name "${LAMBDA_FUNCTION_NAME}" --query "Configuration.FunctionArn" --output text)
          INTEGRATION_URI="arn:aws:apigateway:${AWS_REGION}:lambda:path/2015-03-31/functions/${LAMBDA_ARN}/invocations"

          INTEGRATION_ID=$(aws apigatewayv2 get-integrations --api-id "${API_ID}" --query "Items[?IntegrationUri=='${INTEGRATION_URI}'].IntegrationId | [0]" --output text)
          if [ -z "${INTEGRATION_ID}" ] || [ "${INTEGRATION_ID}" = "None" ]; then
            INTEGRATION_ID=$(aws apigatewayv2 create-integration \
              --api-id "${API_ID}" \
              --integration-type AWS_PROXY \
              --payload-format-version "2.0" \
              --integration-method POST \
              --integration-uri "${INTEGRATION_URI}" \
              --query "IntegrationId" \
              --output text)
            echo "Created integration: ${INTEGRATION_ID}"
          fi

          ROUTE_ID=$(aws apigatewayv2 get-routes --api-id "${API_ID}" --query "Items[?RouteKey=='${ROUTE_KEY}'].RouteId | [0]" --output text)
          if [ -z "${ROUTE_ID}" ] || [ "${ROUTE_ID}" = "None" ]; then
            aws apigatewayv2 create-route \
              --api-id "${API_ID}" \
              --route-key "${ROUTE_KEY}" \
              --target "integrations/${INTEGRATION_ID}" >/dev/null
            echo "Created route: ${ROUTE_KEY}"
          else
            aws apigatewayv2 update-route \
              --api-id "${API_ID}" \
              --route-id "${ROUTE_ID}" \
              --target "integrations/${INTEGRATION_ID}" >/dev/null
            echo "Updated route: ${ROUTE_KEY}"
          fi

          if aws apigatewayv2 get-stage --api-id "${API_ID}" --stage-name "${EFFECTIVE_STAGE_NAME}" >/dev/null 2>&1; then
            aws apigatewayv2 update-stage \
              --api-id "${API_ID}" \
              --stage-name "${EFFECTIVE_STAGE_NAME}" \
              --auto-deploy >/dev/null
          else
            aws apigatewayv2 create-stage \
              --api-id "${API_ID}" \
              --stage-name "${EFFECTIVE_STAGE_NAME}" \
              --auto-deploy >/dev/null
          fi

          ACCOUNT_ID=$(aws sts get-caller-identity --query "Account" --output text)
          SOURCE_ARN="arn:aws:execute-api:${AWS_REGION}:${ACCOUNT_ID}:${API_ID}/*/POST/${CLEAN_PATH}"
          STATEMENT_ID=$(echo "apigw-${API_ID}-post-${CLEAN_PATH}" | tr '/' '-' | tr -cd '[:alnum:]-' | cut -c1-90)

          set +e
          ADD_PERMISSION_OUTPUT=$(aws lambda add-permission \
            --function-name "${LAMBDA_FUNCTION_NAME}" \
            --statement-id "${STATEMENT_ID}" \
            --action "lambda:InvokeFunction" \
            --principal apigateway.amazonaws.com \
            --source-arn "${SOURCE_ARN}" 2>&1)
          ADD_PERMISSION_STATUS=$?
          set -e

          if [ "${ADD_PERMISSION_STATUS}" -ne 0 ]; then
            if echo "${ADD_PERMISSION_OUTPUT}" | grep -q "ResourceConflictException"; then
              echo "Lambda invoke permission already exists."
            else
              echo "${ADD_PERMISSION_OUTPUT}"
              exit 1
            fi
          fi

          API_ENDPOINT=$(aws apigatewayv2 get-api --api-id "${API_ID}" --query "ApiEndpoint" --output text)
          INVOKE_URL="${API_ENDPOINT}${EFFECTIVE_ROUTE_PATH}"
          echo "api_id=${API_ID}" >> "${GITHUB_OUTPUT}"
          echo "invoke_url=${INVOKE_URL}" >> "${GITHUB_OUTPUT}"

      - name: Show invoke URL
        run: |
          echo "API Gateway invoke URL: ${{ steps.apigw.outputs.invoke_url }}"
