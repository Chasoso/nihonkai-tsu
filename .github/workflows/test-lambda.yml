name: Lambda Local Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/lambda/**"
      - "tests/run-lambda-exception-tests.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/test-lambda.yml"
  pull_request:
    paths:
      - "backend/lambda/**"
      - "tests/run-lambda-exception-tests.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/test-lambda.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-lambda:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Lambda tests with coverage
        run: npm run test:lambda:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lambda-coverage
          path: |
            coverage/lambda/**
          if-no-files-found: warn
